name: crawler

on:
  schedule:
    # ⚠️ GitHub Actions cron 有延迟（通常 5~30 分钟，高峰期更长）
    # 目标北京时间 10:00 → 提前 30 分钟调度（UTC 1:30 = 北京 9:30）
    - cron: "30 1 * * *"
    # 目标北京时间 22:00 → 提前 30 分钟调度（UTC 13:30 = 北京 21:30）
    - cron: "30 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler
        run: python main.py
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}

      - name: Commit db.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add db.json
          git diff --staged --quiet || git commit -m "chore: update db.json"
          git push